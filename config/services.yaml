# This file is the entry point to configure your own services.
# Files in the packages/ subdirectory configure your dependencies.

# Put parameters here that don't need to change on each machine where the app is deployed
# https://symfony.com/doc/current/best_practices.html#use-parameters-for-application-configuration
parameters:
    attachments_directory: '%kernel.project_dir%/public/uploads/attachments'
    stripe_secret_key: '%env(STRIPE_SECRET_KEY)%'
    stripe_publishable_key: '%env(STRIPE_PUBLISHABLE_KEY)%'
    stripe_price_monthly: '%env(STRIPE_PRICE_MONTHLY)%'
    stripe_price_annual: '%env(STRIPE_PRICE_ANNUAL)%'
    app.loan.default_loan_days: 21
    app.loan.renewal_days: 14
    app.loan.max_renewals: 3
    app.loan.daily_penalty_rate: 0.50
    app.loan.daily_late_fee_rate: 0.50
    app.forum.api.timeout_seconds: '%env(float:FORUM_MODERATION_API_TIMEOUT)%'
    app.forum.api.toxicity_threshold: '%env(float:FORUM_MODERATION_TOXICITY_THRESHOLD)%'
    app.forum.ai.enabled: '%env(bool:FORUM_AI_ENABLED)%'
    app.forum.ai.provider: '%env(string:FORUM_AI_PROVIDER)%'
    app.forum.ai.endpoint: '%env(string:FORUM_AI_ENDPOINT)%'
    app.forum.ai.api_key: '%env(string:FORUM_AI_API_KEY)%'
    app.forum.ai.model: '%env(string:FORUM_AI_MODEL)%'
    app.forum.ai.timeout_seconds: '%env(float:FORUM_AI_TIMEOUT_SECONDS)%'
    app.forum.ai.temperature: '%env(float:FORUM_AI_TEMPERATURE)%'
    app.forum.ai.max_tokens: '%env(int:FORUM_AI_MAX_TOKENS)%'
    app.forum.ai.min_input_chars: '%env(int:FORUM_AI_MIN_INPUT_CHARS)%'
    app.forum.ai.confidence_threshold: '%env(float:FORUM_AI_CONFIDENCE_THRESHOLD)%'
    app.forum.ai.max_context_comments: '%env(int:FORUM_AI_MAX_CONTEXT_COMMENTS)%'

services:
    # default configuration for services in *this* file
    _defaults:
        autowire: true      # Automatically injects dependencies in your services.
        autoconfigure: true # Automatically registers your services as commands, event subscribers, etc.

    # makes classes in src/ available to be used as services
    # this creates a service per class whose id is the fully-qualified class name
    App\:
        resource: '../src/'
        exclude:
            - '../src/DependencyInjection/'
            - '../src/Entity/'
            - '../src/Kernel.php'

    # add more service definitions when explicit configuration is needed
    # please note that last definitions always *replace* previous ones

    App\Service\GoogleBooksService:
        arguments:
            $googleBooksApiKey: '%env(GOOGLE_BOOKS_API_KEY)%'
    # --- File Upload Service Configuration ---
    App\Service\FileUploadService:
        arguments:
            $attachmentsDirectory: '%attachments_directory%'
    App\Service\LoanService:
        arguments:
            $defaultLoanDays: '%app.loan.default_loan_days%'
            $renewalDays: '%app.loan.renewal_days%'
            $maxRenewals: '%app.loan.max_renewals%'
            $dailyPenaltyRate: '%app.loan.daily_penalty_rate%'

    App\Service\RenewalService:
        arguments:
            $renewalDays: '%app.loan.renewal_days%'
            $maxRenewals: '%app.loan.max_renewals%'

    App\Command\AccrueDailyLateFeesCommand:
        arguments:
            $dailyLateFeeRate: '%app.loan.daily_late_fee_rate%'

    App\Service\Forum\LlmAiClient:
        arguments:
            $enabled: '%app.forum.ai.enabled%'
            $provider: '%app.forum.ai.provider%'
            $endpoint: '%app.forum.ai.endpoint%'
            $apiKey: '%app.forum.ai.api_key%'
            $model: '%app.forum.ai.model%'
            $timeoutSeconds: '%app.forum.ai.timeout_seconds%'
            $temperature: '%app.forum.ai.temperature%'
            $maxTokens: '%app.forum.ai.max_tokens%'

    App\Service\Forum\ForumAiAssistantService:
        arguments:
            $minInputChars: '%app.forum.ai.min_input_chars%'
            $confidenceThreshold: '%app.forum.ai.confidence_threshold%'
            $maxContextComments: '%app.forum.ai.max_context_comments%'

    App\Service\Forum\PerspectiveApiClient:
        arguments:
            $endpoint: '%env(string:PERSPECTIVE_API_ENDPOINT)%'
            $apiKey: '%env(string:PERSPECTIVE_API_KEY)%'
            $timeoutSeconds: '%app.forum.api.timeout_seconds%'

    App\Service\Forum\ForumContentModerationService:
        arguments:
            $toxicityThreshold: '%app.forum.api.toxicity_threshold%'

    App\Service\StripeConfigService:
        arguments:
            $stripeSecretKey: '%stripe_secret_key%'
            $stripePriceMonthly: '%stripe_price_monthly%'
            $stripePriceAnnual: '%stripe_price_annual%'
            $projectDir: '%kernel.project_dir%'

    App\Controller\MembershipController:
        arguments:
            $stripeConfig: '@App\Service\StripeConfigService'
