vich_uploader:
    db_driver: orm
    mappings:
        club_image:
            uri_prefix: /uploads/clubs
            upload_destination: '%kernel.project_dir%/public/uploads/clubs'
            namer: Vich\UploaderBundle\Naming\UniqidNamer
        event_image:
            uri_prefix: /uploads/events
            upload_destination: '%kernel.project_dir%/public/uploads/events'
            namer: Vich\UploaderBundle\Naming\UniqidNamer